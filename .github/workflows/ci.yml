name: TradeBlocks CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master, feat/tradeblocks-3.0]

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  mcp-server:
    name: MCP Server
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build MCP Server
        run: npm run build -w packages/mcp-server

      - name: Run MCP Server Tests
        run: npm test -w packages/mcp-server

