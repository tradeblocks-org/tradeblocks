name: TradeBlocks CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master, feat/tradeblocks-3.0]

permissions:
  contents: read

jobs:
  import-boundary:
    name: Import boundary gates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Reverse-direction imports from sibling consumer repos must not appear
      # anywhere under packages/** or app/**. The leading `!` inverts grep's
      # exit code: pass when there are zero matches.
      - name: Reverse import gate
        run: '! git grep -E "(holodeck|private-packages|tradeblocks-private)" -- "packages/**" "app/**"'

      # file:-protocol dependencies pin to local filesystem paths and would
      # let a sibling repo silently slip into tradeblocks. None are permitted
      # in the root or any workspace package.
      - name: "No file: deps gate"
        run: '! grep -q ''"file:'' package.json packages/*/package.json'

      # The tradeblocks-mcp exports map is the package's published surface.
      # Verify every target file resolves on disk and that no excluded
      # subpaths have crept in. See the script's header for the policy.
      - name: Verify mcp-server exports surface
        run: node packages/mcp-server/scripts/verify-exports-surface.mjs

  security:
    name: Dependency audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Blocks on high/critical advisories only. Moderate-and-below are not
      # gated here (pre-existing transitive debt; Dependabot tracks those).
      # The `hono` high (transitive via the repomix devDependency) is held at
      # a patched version by the `overrides` pin in package.json.
      - name: Audit (high+)
        run: npm run audit

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build

  mcp-server:
    name: MCP Server
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build MCP Server
        run: npm run build -w packages/mcp-server

      # Heap ceiling is 6144 MB per worker as headroom for `workerIdleMemoryLimit`
      # (set in packages/mcp-server/jest.config.js) to recycle workers cleanly
      # before V8 aborts under the Jest suite's peak memory.
      - name: Run MCP Server Tests
        run: NODE_OPTIONS='--experimental-vm-modules --max-old-space-size=6144' npx jest --config packages/mcp-server/jest.config.js
